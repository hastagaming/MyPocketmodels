name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # --- BAGIAN RAHASIA NASA ---
    # Mengambil token dari GitHub Secrets dan menyuntikkannya ke file local.properties
    # agar BuildConfig bisa membacanya tanpa membocorkan token ke publik.
    - name: Inject HF_TOKEN to local.properties
      run: |
        echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > local.properties
        echo "Token telah disuntikkan ke lingkungan build."

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # Menyimpan file APK agar bisa didownload di tab Actions
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyPocketModels-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
